name: bible-app
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.epaphrodit.bible-app
    INFOPLIST_FILE: Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  bible-app:
    type: application
    platform: iOS
    sources:
      - Sources/App
      - Sources/Models
      - Sources/Services
      - Sources/Views
      - Sources/Vendor/VerticalSplit
    resources:
      - Resources/Assets.xcassets
      - Resources/BibleData
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
  Bible App Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: bible-app
